<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kronos — Entrar</title>
<style>
:root{--s0:#020c2a;--s1:#0a1738;--s2:#122150;--tp:#eef1fb;--ts:#9aa6c8;--tm:#6b779c;--bd:rgba(120,140,200,0.18);--bds:rgba(120,140,200,0.4);--ac:#a679ff;--bad:#f08a89;--badbg:rgba(226,75,74,0.18)}
*{box-sizing:border-box}
body{margin:0;background:var(--s0);color:var(--tp);font-family:'Inter',-apple-system,'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:var(--s1);border-radius:14px;padding:34px 30px;width:100%;max-width:360px;text-align:center}
img{width:52px;height:52px;object-fit:contain;margin-bottom:10px}
h1{font-size:16px;font-weight:600;margin:0 0 2px}
.sub{font-size:12px;color:var(--tm);margin-bottom:22px}
input{width:100%;background:var(--s2);border:0.5px solid var(--bd);border-radius:8px;color:var(--tp);padding:11px 13px;font-size:14px;font-family:inherit;margin-bottom:10px;outline:none}
input:focus{border-color:var(--ac)}
button{width:100%;background:var(--ac);border:none;border-radius:8px;color:#120b2e;font-weight:600;font-size:14px;padding:11px;cursor:pointer;font-family:inherit;margin-top:4px}
button:hover{opacity:.92}
.err{background:var(--badbg);color:var(--bad);border-radius:8px;padding:9px 12px;font-size:12.5px;margin-bottom:10px;display:none;text-align:left}
.foot{font-size:11px;color:var(--tm);margin-top:18px}
</style>
</head>
<body>
<form class="card" id="f">
  <img src="/kronos_icone.png" alt="Kronos">
  <h1>Painel Kronos</h1>
  <div class="sub">Entre com o acesso do seu negócio</div>
  <div class="err" id="err"></div>
  <input id="user" placeholder="usuário" autocomplete="username" autofocus>
  <input id="pass" type="password" placeholder="senha" autocomplete="current-password">
  <button type="submit">Entrar</button>
  <div class="foot">Kronos Intelligence · atendimento com IA</div>
</form>
<script>
document.getElementById('f').addEventListener('submit', function(ev){
  ev.preventDefault();
  var err = document.getElementById('err');
  err.style.display = 'none';
  fetch('/api/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ user: document.getElementById('user').value, pass: document.getElementById('pass').value })
  }).then(function(r){ return r.json().then(function(d){ return {ok: r.ok, d: d}; }); })
    .then(function(res){
      if (!res.ok) throw new Error(res.d.error || 'Falha no login');
      window.location.href = '/';
    })
    .catch(function(e){ err.textContent = e.message; err.style.display = 'block'; });
});
</script>
</body>
</html>
