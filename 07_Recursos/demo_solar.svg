<svg width="100%" viewBox="0 0 380 1029" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Demo Zênite Energia Solar"><rect x="0" y="0" width="380" height="1029" fill="#ffffff"/><rect x="12" y="12" width="196" height="1001" rx="20" fill="#E5DDD5" stroke="rgba(0,0,0,0.18)" stroke-width="1"/><path d="M32,12 H188 A20,20 0 0 1 208,32 V58 H12 V32 A20,20 0 0 1 32,12 Z" fill="#075E54"/><path d="M26,28 l-6,7 l6,7" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="52" cy="35" r="13" fill="#cfd8d4"/><text x="52" y="35" dy="0.34em" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#075E54">Z</text><text x="72" y="31" font-family="Inter,Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#ffffff">Zênite Energia Solar</text><text x="72" y="46" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#d7ece6">online</text><circle cx="188" cy="34" r="2" fill="#cfe3dc"/><circle cx="195" cy="34" r="2" fill="#cfe3dc"/><rect x="87" y="68" width="46" height="18" rx="6" fill="rgba(255,255,255,0.8)"/><text x="110" y="80" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#54656f">ontem</text><rect x="24" y="94" width="150" height="67" rx="9" fill="#ffffff"/><text x="32" y="113" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Oi, quanto custa</text><text x="32" y="128" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">colocar energia solar</text><text x="32" y="143" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">na minha casa?</text><text x="166" y="155" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">19:20</text><rect x="48" y="168" width="150" height="112" rx="9" fill="#DCF8C6"/><text x="56" y="187" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Oi! Sou a Helena, da</text><text x="56" y="202" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Zênite Energia Solar.</text><text x="56" y="217" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Posso calcular sua</text><text x="56" y="232" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">economia agora mesmo —</text><text x="56" y="247" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">qual o valor médio da</text><text x="56" y="262" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">sua conta de luz?</text><text x="190" y="274" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">19:20  ✓✓</text><rect x="24" y="287" width="150" height="37" rx="9" fill="#ffffff"/><text x="32" y="306" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Uns 850 reais por mês</text><text x="166" y="318" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">19:21</text><rect x="48" y="331" width="150" height="82" rx="9" fill="#DCF8C6"/><text x="56" y="350" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Perfeito! É casa,</text><text x="56" y="365" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">empresa ou rural? E a</text><text x="56" y="380" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">rede é mono, bi ou</text><text x="56" y="395" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">trifásica?</text><text x="190" y="407" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">19:21  ✓✓</text><rect x="24" y="420" width="150" height="37" rx="9" fill="#ffffff"/><text x="32" y="439" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Casa, e é bifásico sim</text><text x="166" y="451" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">19:22</text><rect x="48" y="464" width="150" height="112" rx="9" fill="#DCF8C6"/><text x="56" y="483" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Prontinho! Sistema de</text><text x="56" y="498" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">11 placas (6,0 kWp).</text><text x="56" y="513" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Investimento estimado</text><text x="56" y="528" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">R$ 18.000, economia de</text><text x="56" y="543" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">R$ 734/mês. Se paga em</text><text x="56" y="558" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">2 anos e 1 mês!</text><text x="190" y="570" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">19:22  ✓✓</text><rect x="48" y="583" width="150" height="97" rx="9" fill="#DCF8C6"/><text x="56" y="602" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Depois disso é mais de</text><text x="56" y="617" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">20 anos de energia</text><text x="56" y="632" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">quase de graça. Quer</text><text x="56" y="647" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">agendar a visita</text><text x="56" y="662" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">técnica gratuita?</text><text x="190" y="674" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">19:23  ✓✓</text><rect x="24" y="687" width="150" height="52" rx="9" fill="#ffffff"/><text x="32" y="706" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Quero sim! Pode ser</text><text x="32" y="721" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">sábado de manhã?</text><text x="166" y="733" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">19:24</text><rect x="48" y="746" width="150" height="82" rx="9" fill="#DCF8C6"/><text x="56" y="765" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Combinado! Visita</text><text x="56" y="780" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">sábado de manhã, nosso</text><text x="56" y="795" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">engenheiro confirma</text><text x="56" y="810" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">com você em breve.</text><text x="190" y="822" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">19:24  ✓✓</text><rect x="90" y="835" width="40" height="18" rx="6" fill="rgba(255,255,255,0.8)"/><text x="110" y="847" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#54656f">hoje</text><rect x="48" y="861" width="150" height="97" rx="9" fill="#DCF8C6"/><text x="56" y="880" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Bom dia! Só</text><text x="56" y="895" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">confirmando: nosso</text><text x="56" y="910" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">engenheiro chega às 9h</text><text x="56" y="925" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">pra avaliar seu</text><text x="56" y="940" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">telhado. Até já!</text><text x="190" y="952" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">08:00  ✓✓</text><rect x="22" y="975" width="138" height="26" rx="13" fill="#ffffff"/><text x="34" y="992" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#8696a0">Mensagem</text><circle cx="186" cy="988" r="14" fill="#075E54"/><path d="M181,988 h10 M187,983 l5,5 l-5,5" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="200" cy="224" r="2.4" fill="#1f74e6"/><path d="M200,224 L222,224 L226,224" fill="none" stroke="#1f74e6" stroke-width="1.3"/><text x="230" y="214" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="600" fill="#1f74e6">Atende 24h e</text><text x="230" y="228" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">qualifica o lead</text><text x="230" y="242" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">na hora</text><circle cx="200" cy="520" r="2.4" fill="#1f74e6"/><path d="M200,520 L222,520 L226,520" fill="none" stroke="#1f74e6" stroke-width="1.3"/><text x="230" y="503" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="600" fill="#1f74e6">Calcula payback</text><text x="230" y="517" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">real na hora</text><text x="230" y="531" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">(nunca chuta</text><text x="230" y="545" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">número)</text><circle cx="200" cy="632" r="2.4" fill="#1f74e6"/><path d="M200,632 L222,632 L226,632" fill="none" stroke="#1f74e6" stroke-width="1.3"/><text x="230" y="622" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="600" fill="#1f74e6">Convida pra visita</text><text x="230" y="636" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">técnica sem</text><text x="230" y="650" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">pressão</text><circle cx="200" cy="787" r="2.4" fill="#1f74e6"/><path d="M200,787 L222,787 L226,787" fill="none" stroke="#1f74e6" stroke-width="1.3"/><text x="230" y="777" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="600" fill="#1f74e6">Agenda a visita</text><text x="230" y="791" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">direto no CRM da</text><text x="230" y="805" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">equipe</text><circle cx="200" cy="910" r="2.4" fill="#1f74e6"/><path d="M200,910 L222,910 L226,910" fill="none" stroke="#1f74e6" stroke-width="1.3"/><text x="230" y="900" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="600" fill="#1f74e6">Lembrete</text><text x="230" y="914" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">automático antes</text><text x="230" y="928" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">da visita</text></svg>