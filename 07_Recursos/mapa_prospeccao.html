<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex, nofollow"/>
  <title>Kronos — Operação de Prospecção SP</title>
  <link rel="icon" type="image/png" href="identidade_visual/kronos_favicon.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --azul:#020c2a; --azul2:#0a1740; --indigo:#3060c8; --turq:#1890c0;
      --branco:#f0f4ff; --cinza:#8898bb; --linha:rgba(255,255,255,0.08);
      --go:#1bb58a; --next:#e0a020; --plan:#5a6a90; --done:#2bbf6a;
    }
    body{font-family:'Inter',sans-serif;background:var(--azul);color:var(--branco);
      min-height:100vh;display:flex;justify-content:center;padding:28px 18px 48px;}
    .wrap{width:100%;max-width:540px;}
    .brand{display:flex;align-items:center;gap:10px;margin-bottom:22px;}
    .brand .mark{font-size:1.25rem;font-weight:700;letter-spacing:.06em;
      background:linear-gradient(135deg,#a080ff,#40a8e0);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .brand .mark span{font-weight:300;}
    h1{font-size:1.35rem;font-weight:600;margin-bottom:4px;}
    .sub{color:var(--cinza);font-size:.9rem;margin-bottom:20px;}
    .card{background:var(--azul2);border:1px solid var(--linha);border-radius:16px;
      padding:18px;margin-bottom:18px;}
    svg{width:100%;height:auto;display:block;}
    .legend{display:flex;flex-wrap:wrap;gap:12px;margin:14px 2px 0;font-size:.8rem;color:var(--cinza);}
    .legend span{display:inline-flex;align-items:center;gap:6px;}
    .dot{width:11px;height:11px;border-radius:999px;display:inline-block;}
    .row{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--linha);}
    .row:last-child{border-bottom:none;}
    .num{width:22px;height:22px;border-radius:999px;color:#fff;font-size:.72rem;font-weight:600;
      display:flex;align-items:center;justify-content:center;flex:none;}
    .rname{flex:1;min-width:0;font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .rname small{display:block;color:var(--cinza);font-size:.72rem;font-weight:400;}
    .track{flex:none;width:70px;height:6px;border-radius:999px;background:rgba(255,255,255,0.1);overflow:hidden;}
    .fill{display:block;height:100%;border-radius:999px;}
    .cnt{flex:none;width:50px;text-align:right;font-size:.78rem;color:var(--cinza);}
    .foot{color:var(--cinza);font-size:.8rem;line-height:1.6;margin-top:4px;}
    .foot b{color:var(--branco);font-weight:500;}
    .updated{color:var(--cinza);font-size:.72rem;margin-top:16px;text-align:center;}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand"><span class="mark">i<span>Kronos</span></span></div>

          fill="#0e1c48" stroke="#3060c8" stroke-width="1.1" stroke-linejoin="round"/>
        <g id="dots"></g>
      </svg>
      <div class="legend">
        <span><i class="dot" style="background:var(--go)"></i>em andamento</span>
        <span><i class="dot" style="background:var(--next)"></i>próxima onda</span>
        <span><i class="dot" style="background:var(--plan)"></i>planejada</span>
        <span><i class="dot" style="background:var(--done)"></i>concluída</span>
      </div>
    </div>

    <div class="card">
      <div id="list"></div>
    </div>

    <p class="foot">Meta por região: <b>150 contatos válidos</b> — 50 por nicho (25 renomados + 25 pequenos), em advocacia, clínicas e parecer científico.</p>
    <p class="updated" id="upd"></p>
  </div>

  <script>
    const META = 150;
    const COL = {go:'#1bb58a', next:'#e0a020', plan:'#5a6a90', done:'#2bbf6a'};
    const regions = [
      {n:1, name:'Campinas (RMC)',        wave:'Onda 1', st:'go',   c:173, x:249.8, y:150.8},
      {n:2, name:'Capital + Grande SP',   wave:'Onda 2', st:'next', c:0,  x:266.2, y:177.2},
      {n:3, name:'Vale do Paraíba',       wave:'Onda 3', st:'plan', c:0,  x:294.7, y:161.9},
      {n:4, name:'Baixada Santista',      wave:'Onda 4', st:'plan', c:0,  x:277.6, y:194.0},
      {n:5, name:'Ribeirão Preto',        wave:'Onda 5', st:'plan', c:0,  x:221.3, y:79.2},
      {n:6, name:'Sorocaba',              wave:'Onda 6', st:'plan', c:0,  x:234.6, y:175.1},
      {n:7, name:'São José do Rio Preto', wave:'Onda 7', st:'plan', c:0,  x:161.6, y:64.4},
      {n:8, name:'Bauru / Centro',        wave:'Onda 8', st:'plan', c:0,  x:173.8, y:126.1},
      {n:9, name:'Oeste (Pres. Prudente)',wave:'Onda 9', st:'plan', c:0,  x:85.2,  y:118.3}
    ];

    const NS = 'http://www.w3.org/2000/svg';
    const dots = document.getElementById('dots');
    regions.slice().sort(a=>a.st==='plan'?-1:1).forEach(r=>{
      const col = COL[r.st];
      if (r.st!=='plan'){
        const halo = document.createElementNS(NS,'circle');
        halo.setAttribute('cx',r.x); halo.setAttribute('cy',r.y);
        halo.setAttribute('r','17'); halo.setAttribute('fill',col); halo.setAttribute('fill-opacity','0.22');
        dots.appendChild(halo);
      }
      const c = document.createElementNS(NS,'circle');
      const rad = r.st==='plan' ? 7 : 8.5;
      c.setAttribute('cx',r.x); c.setAttribute('cy',r.y); c.setAttribute('r',rad);
      c.setAttribute('fill',col); c.setAttribute('stroke','#fff'); c.setAttribute('stroke-width','1.5');
      dots.appendChild(c);
      const t = document.createElementNS(NS,'text');
      t.setAttribute('x',r.x); t.setAttribute('y',r.y); t.setAttribute('dy','0.32em');
      t.setAttribute('text-anchor','middle'); t.setAttribute('fill','#fff');
      t.setAttribute('font-size','11'); t.setAttribute('font-weight','600');
      t.setAttribute('font-family','Inter,sans-serif'); t.textContent = r.n;
      dots.appendChild(t);
    });

    const list = document.getElementById('list');
    regions.forEach(r=>{
      const pct = Math.min(100, Math.round(r.c/META*100));
      const col = COL[r.st];
      const div = document.createElement('div');
      div.className = 'row';
      div.innerHTML =
        '<span class="num" style="background:'+col+'">'+r.n+'</span>'+
        '<span class="rname">'+r.name+'<small>'+r.wave+'</small></span>'+
        '<span class="track"><span class="fill" style="width:'+pct+'%;background:'+col+'"></span></span>'+
        '<span class="cnt">'+r.c+'/'+META+'</span>';
      list.appendChild(div);
    });

    document.getElementById('upd').textContent = 'Atualizado em ' +
      new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
  </script>
</body>
</html>
