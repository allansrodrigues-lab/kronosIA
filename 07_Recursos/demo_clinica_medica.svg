<svg width="100%" viewBox="0 0 380 1119" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Demo Cedro Saúde"><rect x="0" y="0" width="380" height="1119" fill="#ffffff"/><rect x="12" y="12" width="196" height="1091" rx="20" fill="#E5DDD5" stroke="rgba(0,0,0,0.18)" stroke-width="1"/><path d="M32,12 H188 A20,20 0 0 1 208,32 V58 H12 V32 A20,20 0 0 1 32,12 Z" fill="#075E54"/><path d="M26,28 l-6,7 l6,7" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="52" cy="35" r="13" fill="#cfd8d4"/><text x="52" y="35" dy="0.34em" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#075E54">C</text><text x="72" y="31" font-family="Inter,Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#ffffff">Cedro Saúde</text><text x="72" y="46" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#d7ece6">online</text><circle cx="188" cy="34" r="2" fill="#cfe3dc"/><circle cx="195" cy="34" r="2" fill="#cfe3dc"/><rect x="87" y="68" width="46" height="18" rx="6" fill="rgba(255,255,255,0.8)"/><text x="110" y="80" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#54656f">ontem</text><rect x="24" y="94" width="150" height="67" rx="9" fill="#ffffff"/><text x="32" y="113" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Boa noite, queria</text><text x="32" y="128" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">marcar uma consulta</text><text x="32" y="143" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">com dermatologista</text><text x="166" y="155" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">21:40</text><rect x="48" y="168" width="150" height="127" rx="9" fill="#DCF8C6"/><text x="56" y="187" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Boa noite! Sou a Vera,</text><text x="56" y="202" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">da Cedro Saúde. Antes</text><text x="56" y="217" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">de começar: preciso</text><text x="56" y="232" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">registrar alguns dados</text><text x="56" y="247" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">(nome, contato). Tudo</text><text x="56" y="262" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">com sigilo, conforme a</text><text x="56" y="277" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">LGPD. Posso seguir?</text><text x="190" y="289" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">21:40  ✓✓</text><rect x="24" y="302" width="150" height="52" rx="9" fill="#ffffff"/><text x="32" y="321" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Pode sim. É pra mim,</text><text x="32" y="336" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Ana Souza</text><text x="166" y="348" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">21:41</text><rect x="48" y="361" width="150" height="67" rx="9" fill="#DCF8C6"/><text x="56" y="380" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Obrigada, Ana! Vai ser</text><text x="56" y="395" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">pelo convênio ou</text><text x="56" y="410" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">particular?</text><text x="190" y="422" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">21:41  ✓✓</text><rect x="24" y="435" width="150" height="82" rx="9" fill="#ffffff"/><text x="32" y="454" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Vida Plena. Aliás,</text><text x="32" y="469" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">tenho uma pinta escura</text><text x="32" y="484" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">que cresceu, será que</text><text x="32" y="499" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">é grave?</text><text x="166" y="511" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">21:42</text><rect x="48" y="524" width="150" height="127" rx="9" fill="#DCF8C6"/><text x="56" y="543" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Isso é algo que o Dr.</text><text x="56" y="558" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Igor avalia com</text><text x="56" y="573" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">segurança na consulta</text><text x="56" y="588" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">— e não vou te deixar</text><text x="56" y="603" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">com essa dúvida: tenho</text><text x="56" y="618" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">quinta às 14h.</text><text x="56" y="633" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Confirmo?</text><text x="190" y="645" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">21:42  ✓✓</text><rect x="24" y="658" width="150" height="52" rx="9" fill="#ffffff"/><text x="32" y="677" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Confirma sim, por</text><text x="32" y="692" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">favor</text><text x="166" y="704" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">21:43</text><rect x="48" y="717" width="150" height="112" rx="9" fill="#DCF8C6"/><text x="56" y="736" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Consulta confirmada:</text><text x="56" y="751" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">quinta, 14h,</text><text x="56" y="766" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Dermatologia. Leve</text><text x="56" y="781" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">documento com foto e a</text><text x="56" y="796" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">carteirinha do</text><text x="56" y="811" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">convênio.</text><text x="190" y="823" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">21:43  ✓✓</text><rect x="90" y="836" width="40" height="18" rx="6" fill="rgba(255,255,255,0.8)"/><text x="110" y="848" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#54656f">hoje</text><rect x="24" y="862" width="150" height="52" rx="9" fill="#ffffff"/><text x="32" y="881" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">socorro, meu marido tá</text><text x="32" y="896" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">com dor forte no peito</text><text x="166" y="908" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">07:12</text><rect x="48" y="921" width="150" height="127" rx="9" fill="#DCF8C6"/><text x="56" y="940" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Isso pode precisar de</text><text x="56" y="955" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">atendimento IMEDIATO:</text><text x="56" y="970" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">ligue 192 (SAMU) ou vá</text><text x="56" y="985" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">ao pronto-socorro</text><text x="56" y="1000" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">agora. Já avisei nossa</text><text x="56" y="1015" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">equipe pra te dar</text><text x="56" y="1030" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">suporte também.</text><text x="190" y="1042" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">07:12  ✓✓</text><rect x="22" y="1065" width="138" height="26" rx="13" fill="#ffffff"/><text x="34" y="1082" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#8696a0">Mensagem</text><circle cx="186" cy="1078" r="14" fill="#075E54"/><path d="M181,1078 h10 M187,1073 l5,5 l-5,5" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="200" cy="232" r="2.4" fill="#1f74e6"/><path d="M200,232 L222,232 L226,232" fill="none" stroke="#1f74e6" stroke-width="1.3"/><text x="230" y="222" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="600" fill="#1f74e6">Pede aceite LGPD</text><text x="230" y="236" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">antes de coletar</text><text x="230" y="250" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">dados</text><circle cx="200" cy="394" r="2.4" fill="#1f74e6"/><path d="M200,394 L222,394 L226,394" fill="none" stroke="#1f74e6" stroke-width="1.3"/><text x="230" y="392" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="600" fill="#1f74e6">Atende 24h, uma</text><text x="230" y="406" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">pergunta por vez</text><circle cx="200" cy="588" r="2.4" fill="#1f74e6"/><path d="M200,588 L222,588 L226,588" fill="none" stroke="#1f74e6" stroke-width="1.3"/><text x="230" y="578" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="600" fill="#1f74e6">Não opina sobre</text><text x="230" y="592" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">sintoma — leva pro</text><text x="230" y="606" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">médico</text><circle cx="200" cy="773" r="2.4" fill="#1f74e6"/><path d="M200,773 L222,773 L226,773" fill="none" stroke="#1f74e6" stroke-width="1.3"/><text x="230" y="763" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="600" fill="#1f74e6">Agenda e registra</text><text x="230" y="777" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">direto no CRM da</text><text x="230" y="791" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">clínica</text><circle cx="200" cy="984" r="2.4" fill="#1f74e6"/><path d="M200,984 L222,984 L226,984" fill="none" stroke="#1f74e6" stroke-width="1.3"/><text x="230" y="974" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="600" fill="#1f74e6">Triagem de</text><text x="230" y="988" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">urgência: age na</text><text x="230" y="1002" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">hora, sem IA</text></svg>