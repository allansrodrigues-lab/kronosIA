<svg width="100%" viewBox="0 0 380 971" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Demo Schalletti Imóveis"><rect x="0" y="0" width="380" height="971" fill="#ffffff"/><rect x="12" y="12" width="196" height="943" rx="20" fill="#E5DDD5" stroke="rgba(0,0,0,0.18)" stroke-width="1"/><path d="M32,12 H188 A20,20 0 0 1 208,32 V58 H12 V32 A20,20 0 0 1 32,12 Z" fill="#075E54"/><path d="M26,28 l-6,7 l6,7" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="52" cy="35" r="13" fill="#cfd8d4"/><text x="52" y="35" dy="0.34em" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#075E54">S</text><text x="72" y="31" font-family="Inter,Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#ffffff">Schalletti Imóveis</text><text x="72" y="46" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#d7ece6">online</text><circle cx="188" cy="34" r="2" fill="#cfe3dc"/><circle cx="195" cy="34" r="2" fill="#cfe3dc"/><rect x="87" y="68" width="46" height="18" rx="6" fill="rgba(255,255,255,0.8)"/><text x="110" y="80" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#54656f">ontem</text><rect x="24" y="94" width="150" height="82" rx="9" fill="#ffffff"/><text x="32" y="113" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Oi! Procuro um apê de</text><text x="32" y="128" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">2 quartos pra comprar</text><text x="32" y="143" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">no Cambuí, até uns 700</text><text x="32" y="158" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">mil.</text><text x="166" y="170" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">10:04</text><rect x="48" y="183" width="150" height="97" rx="9" fill="#DCF8C6"/><text x="56" y="202" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Oi! Sou a Sofia, da</text><text x="56" y="217" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Schalletti Imóveis.</text><text x="56" y="232" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Adorei o perfil, deixa</text><text x="56" y="247" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">eu ver o que temos por</text><text x="56" y="262" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">aí.</text><text x="190" y="274" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">10:04  ✓✓</text><rect x="48" y="287" width="150" height="97" rx="9" fill="#DCF8C6"/><text x="56" y="306" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Achei o SCH-001:</text><text x="56" y="321" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Cambuí, 2 quartos,</text><text x="56" y="336" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">74m², varanda gourmet,</text><text x="56" y="351" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">R$ 690.000. Quer ver</text><text x="56" y="366" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">outra opção também?</text><text x="190" y="378" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">10:05  ✓✓</text><rect x="24" y="391" width="150" height="67" rx="9" fill="#ffffff"/><text x="32" y="410" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Gostei desse! Dá pra</text><text x="32" y="425" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">financiar? Quanto</text><text x="32" y="440" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">ficaria a parcela?</text><text x="166" y="452" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">10:07</text><rect x="48" y="465" width="150" height="127" rx="9" fill="#DCF8C6"/><text x="56" y="484" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Dá sim! Com 20% de</text><text x="56" y="499" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">entrada e 30 anos, a</text><text x="56" y="514" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">parcela inicial fica</text><text x="56" y="529" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">em torno de R$ 4.850</text><text x="56" y="544" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">(tabela Price). Quer</text><text x="56" y="559" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">que eu simule outra</text><text x="56" y="574" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">entrada?</text><text x="190" y="586" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">10:08  ✓✓</text><rect x="24" y="599" width="150" height="82" rx="9" fill="#ffffff"/><text x="32" y="618" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Perfeito, quero</text><text x="32" y="633" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">conhecer pessoalmente.</text><text x="32" y="648" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Pode ser sábado de</text><text x="32" y="663" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">manhã?</text><text x="166" y="675" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">10:10</text><rect x="48" y="688" width="150" height="97" rx="9" fill="#DCF8C6"/><text x="56" y="707" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Combinado! Visita no</text><text x="56" y="722" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">SCH-001 sábado às 10h,</text><text x="56" y="737" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">com a corretora</text><text x="56" y="752" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Beatriz. Te aviso um</text><text x="56" y="767" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">dia antes.</text><text x="190" y="779" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">10:10  ✓✓</text><rect x="90" y="792" width="40" height="18" rx="6" fill="rgba(255,255,255,0.8)"/><text x="110" y="804" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#54656f">hoje</text><rect x="48" y="818" width="150" height="82" rx="9" fill="#DCF8C6"/><text x="56" y="837" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Oi! Passando pra</text><text x="56" y="852" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">saber: o que achou do</text><text x="56" y="867" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">apê depois da visita</text><text x="56" y="882" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">de sábado?</text><text x="190" y="894" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">16:00  ✓✓</text><rect x="22" y="917" width="138" height="26" rx="13" fill="#ffffff"/><text x="34" y="934" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#8696a0">Mensagem</text><circle cx="186" cy="930" r="14" fill="#075E54"/><path d="M181,930 h10 M187,925 l5,5 l-5,5" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="200" cy="232" r="2.4" fill="#1f74e6"/><path d="M200,232 L222,232 L226,232" fill="none" stroke="#1f74e6" stroke-width="1.3"/><text x="230" y="228" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="600" fill="#1f74e6">Atende 24h e</text><text x="230" y="242" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">qualifica o perfil</text><circle cx="200" cy="336" r="2.4" fill="#1f74e6"/><path d="M200,336 L222,336 L226,336" fill="none" stroke="#1f74e6" stroke-width="1.3"/><text x="230" y="326" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="600" fill="#1f74e6">Faz matching com a</text><text x="230" y="340" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">carteira (2-3</text><text x="230" y="354" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">opções)</text><circle cx="200" cy="528" r="2.4" fill="#1f74e6"/><path d="M200,528 L222,528 L226,528" fill="none" stroke="#1f74e6" stroke-width="1.3"/><text x="230" y="518" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="600" fill="#1f74e6">Calcula</text><text x="230" y="532" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">financiamento na</text><text x="230" y="546" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">hora (Price/SAC)</text><circle cx="200" cy="736" r="2.4" fill="#1f74e6"/><path d="M200,736 L222,736 L226,736" fill="none" stroke="#1f74e6" stroke-width="1.3"/><text x="230" y="734" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="600" fill="#1f74e6">Agenda a visita</text><text x="230" y="748" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">direto na agenda</text><circle cx="200" cy="859" r="2.4" fill="#1f74e6"/><path d="M200,859 L222,859 L226,859" fill="none" stroke="#1f74e6" stroke-width="1.3"/><text x="230" y="842" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="600" fill="#1f74e6">Follow-up</text><text x="230" y="856" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">pós-visita, sem</text><text x="230" y="870" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">deixar o lead</text><text x="230" y="884" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">esfriar</text></svg>