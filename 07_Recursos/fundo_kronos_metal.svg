      <stop offset="0%"   style="stop-color:#010e20"/>
      <stop offset="30%"  style="stop-color:#044878"/>
      <stop offset="50%"  style="stop-color:#1890c0"/>
      <stop offset="70%"  style="stop-color:#044878"/>
      <stop offset="100%" style="stop-color:#010a18"/>
    </linearGradient>

    <!-- Versões com ângulo diferente para variar o reflexo -->
    <linearGradient id="m1b" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#0e0220"/>
      <stop offset="30%"  style="stop-color:#3a0a70"/>
      <stop offset="50%"  style="stop-color:#7848c8"/>
      <stop offset="70%"  style="stop-color:#3a0a70"/>
      <stop offset="100%" style="stop-color:#1a0438"/>
    </linearGradient>

    <linearGradient id="m2b" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#020818"/>
      <stop offset="30%"  style="stop-color:#081860"/>
      <stop offset="50%"  style="stop-color:#2048a8"/>
      <stop offset="70%"  style="stop-color:#081860"/>
      <stop offset="100%" style="stop-color:#020820"/>
