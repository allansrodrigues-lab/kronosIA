    <linearGradient id="m3b" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#060118"/>
      <stop offset="30%"  style="stop-color:#160a68"/>
      <stop offset="50%"  style="stop-color:#3830b0"/>
      <stop offset="70%"  style="stop-color:#160a68"/>
      <stop offset="100%" style="stop-color:#080228"/>
    </linearGradient>

    <linearGradient id="m4b" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#010a18"/>
      <stop offset="30%"  style="stop-color:#033860"/>
      <stop offset="50%"  style="stop-color:#1070a0"/>
      <stop offset="70%"  style="stop-color:#033860"/>
      <stop offset="100%" style="stop-color:#010e20"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowsm">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <radialGradient id="centro" cx="50%" cy="50%" r="22%">
      <stop offset="0%"   style="stop-color:#201060;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#000510;stop-opacity:0"/>
    </radialGradient>

  </defs>

  <!-- Fundo escuro profundo -->
