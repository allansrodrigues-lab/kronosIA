<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>

    <!-- METÁLICO: escuro → brilho → escuro simulando reflexo -->

    <!-- Violeta metálico -->
    <linearGradient id="m1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#1a0438"/>
      <stop offset="30%"  style="stop-color:#4a0e90"/>
      <stop offset="50%"  style="stop-color:#9060e0"/>
      <stop offset="70%"  style="stop-color:#4a0e90"/>
      <stop offset="100%" style="stop-color:#0e0220"/>
    </linearGradient>

    <!-- Azul marinho metálico -->
    <linearGradient id="m2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#020820"/>
      <stop offset="30%"  style="stop-color:#0c2078"/>
      <stop offset="50%"  style="stop-color:#3060c8"/>
      <stop offset="70%"  style="stop-color:#0c2078"/>
      <stop offset="100%" style="stop-color:#020818"/>
    </linearGradient>

    <!-- Índigo metálico -->
    <linearGradient id="m3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#080228"/>
      <stop offset="30%"  style="stop-color:#1c0c88"/>
