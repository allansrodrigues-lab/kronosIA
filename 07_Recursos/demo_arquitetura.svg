<svg width="100%" viewBox="0 0 380 1135" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Demo Estúdio Traço"><rect x="0" y="0" width="380" height="1135" fill="#ffffff"/><rect x="12" y="12" width="196" height="1107" rx="20" fill="#E5DDD5" stroke="rgba(0,0,0,0.18)" stroke-width="1"/><path d="M32,12 H188 A20,20 0 0 1 208,32 V58 H12 V32 A20,20 0 0 1 32,12 Z" fill="#075E54"/><path d="M26,28 l-6,7 l6,7" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="52" cy="35" r="13" fill="#cfd8d4"/><text x="52" y="35" dy="0.34em" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#075E54">T</text><text x="72" y="31" font-family="Inter,Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#ffffff">Estúdio Traço</text><text x="72" y="46" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#d7ece6">online</text><circle cx="188" cy="34" r="2" fill="#cfe3dc"/><circle cx="195" cy="34" r="2" fill="#cfe3dc"/><rect x="87" y="68" width="46" height="18" rx="6" fill="rgba(255,255,255,0.8)"/><text x="110" y="80" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#54656f">ontem</text><rect x="24" y="94" width="150" height="97" rx="9" fill="#ffffff"/><text x="32" y="113" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Oi! Comprei um terreno</text><text x="32" y="128" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">e quero construir.</text><text x="32" y="143" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Quanto custa o projeto</text><text x="32" y="158" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">de uma casa de uns</text><text x="32" y="173" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">150m2?</text><text x="166" y="185" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">21:02</text><rect x="48" y="198" width="150" height="172" rx="9" fill="#DCF8C6"/><text x="56" y="217" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Oi! Eu sou a Marina,</text><text x="56" y="232" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">do Estúdio Traço. Que</text><text x="56" y="247" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">projeto bom! Pra uma</text><text x="56" y="262" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">casa de 150 m², o</text><text x="56" y="277" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">investimento fica</text><text x="56" y="292" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">entre R$ 12.000 e R$</text><text x="56" y="307" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">22.500 — o valor exato</text><text x="56" y="322" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">sai na reunião de</text><text x="56" y="337" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">briefing, que é</text><text x="56" y="352" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">gratuita.</text><text x="190" y="364" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">21:02  ✓✓</text><rect x="24" y="377" width="150" height="67" rx="9" fill="#ffffff"/><text x="32" y="396" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Posso tirar a parede</text><text x="32" y="411" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">da cozinha? Acho que é</text><text x="32" y="426" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">estrutural</text><text x="166" y="438" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">21:03</text><rect x="48" y="451" width="150" height="142" rx="9" fill="#DCF8C6"/><text x="56" y="470" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Essa é uma decisão</text><text x="56" y="485" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">técnica que precisa da</text><text x="56" y="500" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">arquiteta — palpite</text><text x="56" y="515" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">aqui seria arriscado</text><text x="56" y="530" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">pro seu imóvel. No</text><text x="56" y="545" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">briefing ela analisa</text><text x="56" y="560" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">isso com você</text><text x="56" y="575" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">direitinho.</text><text x="190" y="587" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">21:03  ✓✓</text><rect x="24" y="600" width="150" height="67" rx="9" fill="#ffffff"/><text x="32" y="619" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Faz sentido! Como</text><text x="32" y="634" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">funciona esse</text><text x="32" y="649" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">briefing?</text><text x="166" y="661" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">21:04</text><rect x="48" y="674" width="150" height="112" rx="9" fill="#DCF8C6"/><text x="56" y="693" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">São 30 minutos com a</text><text x="56" y="708" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">arquiteta, online ou</text><text x="56" y="723" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">no escritório, sem</text><text x="56" y="738" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">custo. Tenho quinta às</text><text x="56" y="753" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">10h ou sexta às 15h —</text><text x="56" y="768" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">qual prefere?</text><text x="190" y="780" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">21:04  ✓✓</text><rect x="24" y="793" width="150" height="37" rx="9" fill="#ffffff"/><text x="32" y="812" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Sexta 15h, presencial!</text><text x="166" y="824" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">21:05</text><rect x="48" y="837" width="150" height="112" rx="9" fill="#DCF8C6"/><text x="56" y="856" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Confirmado: sexta,</text><text x="56" y="871" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">15h, aqui no Estúdio.</text><text x="56" y="886" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Leve fotos e</text><text x="56" y="901" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">referências que você</text><text x="56" y="916" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">curte — ajuda muito no</text><text x="56" y="931" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">briefing!</text><text x="190" y="943" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">21:05  ✓✓</text><rect x="90" y="956" width="40" height="18" rx="6" fill="rgba(255,255,255,0.8)"/><text x="110" y="968" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#54656f">hoje</text><rect x="48" y="982" width="150" height="82" rx="9" fill="#DCF8C6"/><text x="56" y="1001" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Oi! Lembrete: seu</text><text x="56" y="1016" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">briefing com a</text><text x="56" y="1031" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">arquiteta é amanhã às</text><text x="56" y="1046" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">15h. Até lá!</text><text x="190" y="1058" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">09:00  ✓✓</text><rect x="22" y="1081" width="138" height="26" rx="13" fill="#ffffff"/><text x="34" y="1098" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#8696a0">Mensagem</text><circle cx="186" cy="1094" r="14" fill="#075E54"/><path d="M181,1094 h10 M187,1089 l5,5 l-5,5" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="200" cy="284" r="2.4" fill="#1f74e6"/><path d="M200,284 L222,284 L226,284" fill="none" stroke="#1f74e6" stroke-width="1.3"/><text x="230" y="267" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="600" fill="#1f74e6">Estimativa por m²</text><text x="230" y="281" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">na hora —</text><text x="230" y="295" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">calculada, não</text><text x="230" y="309" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">inventada</text><circle cx="200" cy="522" r="2.4" fill="#1f74e6"/><path d="M200,522 L222,522 L226,522" fill="none" stroke="#1f74e6" stroke-width="1.3"/><text x="230" y="512" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="600" fill="#1f74e6">Pergunta técnica</text><text x="230" y="526" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">vai pra arquiteta</text><text x="230" y="540" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">(Lei 12.378)</text><circle cx="200" cy="730" r="2.4" fill="#1f74e6"/><path d="M200,730 L222,730 L226,730" fill="none" stroke="#1f74e6" stroke-width="1.3"/><text x="230" y="713" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="600" fill="#1f74e6">Converte a</text><text x="230" y="727" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">conversa em</text><text x="230" y="741" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">reunião de</text><text x="230" y="755" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">briefing</text><circle cx="200" cy="893" r="2.4" fill="#1f74e6"/><path d="M200,893 L222,893 L226,893" fill="none" stroke="#1f74e6" stroke-width="1.3"/><text x="230" y="883" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="600" fill="#1f74e6">Agenda e registra</text><text x="230" y="897" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">a qualificação no</text><text x="230" y="911" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">CRM</text><circle cx="200" cy="1023" r="2.4" fill="#1f74e6"/><path d="M200,1023 L222,1023 L226,1023" fill="none" stroke="#1f74e6" stroke-width="1.3"/><text x="230" y="1013" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="600" fill="#1f74e6">Lembrete na</text><text x="230" y="1027" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">véspera reduz</text><text x="230" y="1041" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">falta</text></svg>