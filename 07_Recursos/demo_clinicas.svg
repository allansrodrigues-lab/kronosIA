 x="90" y="478" width="40" height="18" rx="6" fill="rgba(255,255,255,0.8)"/><text x="110" y="490" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#54656f">hoje</text><rect x="48" y="504" width="150" height="67" rx="9" fill="#DCF8C6"/><text x="56" y="523" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Oi, Maria! Lembrete:</text><text x="56" y="538" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">sua consulta é hoje às</text><text x="56" y="553" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">15h.</text><text x="190" y="565" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">08:00  ✓✓</text><rect x="48" y="578" width="150" height="52" rx="9" fill="#DCF8C6"/><text x="56" y="597" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">Como ficou sua pele</text><text x="56" y="612" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#111b21">após a limpeza?</text><text x="190" y="624" text-anchor="end" font-family="Inter,Segoe UI,sans-serif" font-size="10.5" fill="#667781">17:30  ✓✓</text><rect x="22" y="647" width="138" height="26" rx="13" fill="#ffffff"/><text x="34" y="664" font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#8696a0">Mensagem</text><circle cx="186" cy="660" r="14" fill="#075E54"/><path d="M181,660 h10 M187,655 l5,5 l-5,5" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="200" cy="202" r="2.4" fill="#1f74e6"/><path d="M200,202 L222,202 L226,202" fill="none" stroke="#1f74e6" stroke-width="1.3"/><text x="230" y="198" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="600" fill="#1f74e6">Atende e responde</text><text x="230" y="212" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">na hora, 24h</text><circle cx="200" cy="327" r="2.4" fill="#1f74e6"/><path d="M200,327 L222,327 L226,327" fill="none" stroke="#1f74e6" stroke-width="1.3"/><text x="230" y="317" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="600" fill="#1f74e6">Mostra base</text><text x="230" y="331" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">científica do</text><text x="230" y="345" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">procedimento</text><circle cx="200" cy="445" r="2.4" fill="#1f74e6"/><path d="M200,445 L222,445 L226,445" fill="none" stroke="#1f74e6" stroke-width="1.3"/><text x="230" y="442" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="600" fill="#1f74e6">Agenda direto na</text><text x="230" y="456" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">agenda da médica</text><circle cx="200" cy="538" r="2.4" fill="#1f74e6"/><path d="M200,538 L222,538 L226,538" fill="none" stroke="#1f74e6" stroke-width="1.3"/><text x="230" y="528" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="600" fill="#1f74e6">Lembrete</text><text x="230" y="542" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">automático 24h</text><text x="230" y="556" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">antes</text><circle cx="200" cy="604" r="2.4" fill="#1f74e6"/><path d="M200,604 L222,604 L226,604" fill="none" stroke="#1f74e6" stroke-width="1.3"/><text x="230" y="601" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="600" fill="#1f74e6">Pós-atendimento e</text><text x="230" y="615" font-family="Inter,Segoe UI,sans-serif" font-size="11.5" font-weight="400" fill="#1f74e6">recompra</text></svg>