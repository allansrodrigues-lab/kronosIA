name: Deploy Kronos VPS

on:
  push:
    branches: [main]
    paths:
      - "07_Recursos/index.html"
      - "07_Recursos/onboard-cliente.py"
      - "07_Recursos/test_harness/**"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    name: Deploy no VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/kronos_vps
          chmod 600 ~/.ssh/kronos_vps
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy index.html (se mudou)
        if: contains(toJson(github.event.commits.*.modified), '07_Recursos/index.html') || contains(toJson(github.event.commits.*.added), '07_Recursos/index.html')
        run: |
          scp -i ~/.ssh/kronos_vps -o StrictHostKeyChecking=no \
            07_Recursos/index.html \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/kronos-site/index.html
          echo "✓ index.html deployado"

      - name: Sincronizar scripts no VPS
        run: |
          scp -i ~/.ssh/kronos_vps -o StrictHostKeyChecking=no \
            07_Recursos/onboard-cliente.py \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/docker/onboard-cliente.py
          ssh -i ~/.ssh/kronos_vps -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "chmod +x /docker/onboard-cliente.py && python3 /docker/onboard-cliente.py --help > /dev/null && echo '✓ onboard-cliente.py OK'"

      - name: Smoke test do site
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://kronosintelligence.com.br/ || echo "000")
          echo "Site HTTP: $HTTP"
          [ "$HTTP" = "200" ] && echo "✓ Site OK" || echo "⚠ Site retornou $HTTP"

      - name: Notificar deploy
        if: always()
        run: |
          STATUS="${{ job.status == 'success' && 'PASS' || 'FAIL' }}"
          curl -s -X POST "https://n8n.kronosintelligence.com.br/webhook/deploy-notify" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"$STATUS\",\"commit\":\"${{ github.event.commits[0].message }}\",\"author\":\"${{ github.event.commits[0].author.name }}\",\"ref\":\"${{ github.ref_name }}\"}" \
            || true
